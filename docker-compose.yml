services:
  db:
    image: postgres:16-alpine
    container_name: yandexmap-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: yandexmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yandexmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yandexmap-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: host=db port=5432 user=postgres password=postgres dbname=yandexmap sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  classifier:
    build:
      context: .
      dockerfile: classifier/Dockerfile
    container_name: yandexmap-classifier
    restart: unless-stopped
    ports:
      - "5055:5055"

  frontend:
    build:
      context: ./yandexMap
      dockerfile: Dockerfile
    container_name: yandexmap-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - classifier
    ports:
      - "5173:5173"

volumes:
  pgdata:
  backend_uploads:
